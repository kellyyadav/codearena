<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solve · Crack It</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f1117;color:#eef0f8;font-family:'Space Grotesk',sans-serif;overflow:hidden;}
  :root{
    --bg:#0f1117;--surface:#161b27;--card:#1c2333;--border:#2a3350;
    --star:#f4c430;--mint:#4ade80;--sky:#60a5fa;--rose:#fb7185;
    --t1:#eef0f8;--t2:#8b93b0;
  }
  .topbar{
    height:52px;display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);
  }
  .logo{font-family:'Syne',sans-serif;font-weight:800;color:var(--t1);}
  .timer{font-family:'Space Mono',monospace;color:var(--star);}
  .workspace{display:flex;height:calc(100vh - 52px);}
  .qpanel{
    width:400px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .qheader{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;}
  .qcontent{flex:1;overflow-y:auto;padding:20px;}
  .epanel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .editorbar{
    padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;
  }
  .btn-run,.btn-submit{
    padding:6px 16px;border:none;border-radius:8px;font-weight:700;cursor:pointer;
  }
  .btn-run{background:var(--mint);color:#0f1117;}
  .btn-submit{background:var(--star);color:#0f1117;margin-left:8px;}
  #monaco-editor{flex:1;min-height:0;}
  .output{
    height:200px;background:var(--card);border-top:1px solid var(--border);
    display:flex;flex-direction:column;
  }
  .outtabs{display:flex;border-bottom:1px solid var(--border);}
  .outtab{padding:8px 16px;cursor:pointer;color:var(--t2);}
  .outtab.active{color:var(--star);border-bottom:2px solid var(--star);}
  .outbody{flex:1;overflow-y:auto;padding:12px;font-family:'Space Mono',monospace;font-size:.75rem;}
  .test-case{
    padding:8px 12px;margin-bottom:8px;border-radius:8px;
    background:var(--surface);border-left:3px solid;
  }
  .test-case.pass{border-left-color:var(--mint);}
  .test-case.fail{border-left-color:var(--rose);}
  .case-status{font-weight:700;margin-right:8px;}
  .badge-pass{color:var(--mint);}.badge-fail{color:var(--rose);}
  .solved-banner{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);
    display:none;align-items:center;justify-content:center;z-index:1000;
  }
  .banner-card{
    background:var(--card);padding:32px;border-radius:20px;text-align:center;
    max-width:400px;width:90%;
  }
  .login-prompt{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);
    display:flex;align-items:center;justify-content:center;z-index:2000;
  }
  .login-card{background:var(--card);padding:32px;border-radius:20px;text-align:center;}
  button{background:var(--star);border:none;padding:8px 20px;border-radius:8px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Crack It ⋆˙⟡</div>
  <div class="timer" id="timer">00:00</div>
  <div><button id="logoutBtn" style="background:transparent;border:1px solid var(--border);color:var(--t2);padding:4px 12px;">Logout</button></div>
</div>

<div class="workspace">
  <div class="qpanel">
    <div class="qheader" id="qTitle">Loading...</div>
    <div class="qcontent" id="qContent"></div>
  </div>
  <div class="epanel">
    <div class="editorbar">
      <select id="langSelect" style="background:var(--surface);color:white;border:1px solid var(--border);padding:4px 8px;border-radius:6px;">
        <option value="javascript">JavaScript</option>
        <!-- Only JS works, others disabled for now -->
        <option value="python" disabled>Python (coming)</option>
      </select>
      <div>
        <button class="btn-run" id="runBtn">▶ Run</button>
        <button class="btn-submit" id="submitBtn">✦ Submit</button>
      </div>
    </div>
    <div id="monaco-editor"></div>
    <div class="output">
      <div class="outtabs">
        <div class="outtab active" data-tab="tests">Test Cases</div>
        <div class="outtab" data-tab="console">Console</div>
      </div>
      <div class="outbody" id="outBody">Run code to see results</div>
    </div>
  </div>
</div>

<div class="solved-banner" id="solvedBanner">
  <div class="banner-card">
    <div style="font-size:48px;">🎉</div>
    <h2>Solved!</h2>
    <p id="bannerStats"></p>
    <button onclick="location.href='index.html'">← Back to Arena</button>
  </div>
</div>

<div class="login-prompt" id="loginPrompt" style="display:none;">
  <div class="login-card">
    <h3>Sign in required</h3>
    <p>Please login to solve questions</p>
    <button id="loginBtn">Login with Google</button>
  </div>
</div>

<script>
  // ---------- CONFIG ----------
  const SUPABASE_URL = 'https://tcawycumfawsxkcfnlpv.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjYXd5Y3VtZmF3c3hrY2ZubHB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MDc5MTEsImV4cCI6MjA5NDQ4MzkxMX0.8RJOpUxiMdveBMaZ1vadyObZLenumzvYYcBg5arIGYU';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let editor = null;
  let currentUser = null;
  let currentQuestion = null;
  let timerSeconds = 0;
  let timerInterval = null;
  let testResults = [];  // { id, input, expected, got, status }
  let consoleOutput = '';

  const urlParams = new URLSearchParams(window.location.search);
  const questionId = urlParams.get('id');
  if (!questionId) { alert('No question ID'); window.location.href = 'index.html'; }

  // ---------- AUTH ----------
  async function ensureProfile(user) {
    const { data: existing } = await sb.from('profiles').select('id').eq('id', user.id).single();
    if (!existing) {
      await sb.from('profiles').insert({
        id: user.id,
        username: user.user_metadata?.name || user.email.split('@')[0],
        avatar_url: user.user_metadata?.avatar_url,
        badge: 'none',
        easy_solved: 0, medium_solved: 0, hard_solved: 0,
        battles_won: 0, questions_count: 0
      });
    }
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;
      await ensureProfile(currentUser);
      document.getElementById('loginPrompt').style.display = 'none';
      if (!currentQuestion) await loadQuestion();
      if (!editor) initEditor();
    } else {
      currentUser = null;
      document.getElementById('loginPrompt').style.display = 'flex';
    }
  });

  document.getElementById('loginBtn')?.addEventListener('click', () => {
    sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  });
  document.getElementById('logoutBtn')?.addEventListener('click', () => { sb.auth.signOut(); location.reload(); });

  // ---------- LOAD QUESTION ----------
  async function loadQuestion() {
    const { data, error } = await sb.from('questions').select('*').eq('id', questionId).single();
    if (error || !data) { document.getElementById('qContent').innerHTML = '<p>Question not found</p>'; return; }
    currentQuestion = data;
    document.getElementById('qTitle').innerHTML = `${data.title} <span style="font-size:12px;background:#2a3350;padding:2px 8px;border-radius:20px;">${data.difficulty}</span>`;
    let html = `<p style="white-space:pre-wrap;">${data.problem}</p>`;
    if (data.examples) {
      html += '<h4>Examples</h4>';
      data.examples.forEach(ex => {
        html += `<div style="background:#1c2333;padding:10px;border-radius:8px;margin-bottom:8px;"><strong>Input:</strong> ${ex.input}<br/><strong>Output:</strong> ${ex.output}</div>`;
      });
    }
    document.getElementById('qContent').innerHTML = html;
    startTimer();
  }

  // ---------- TIMER ----------
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerSeconds = 0;
    timerInterval = setInterval(() => {
      timerSeconds++;
      const mins = Math.floor(timerSeconds / 60);
      const secs = timerSeconds % 60;
      document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }, 1000);
  }

  // ---------- MONACO EDITOR ----------
  function initEditor() {
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], () => {
      monaco.editor.defineTheme('dark', {
        base: 'vs-dark', inherit: true, rules: [],
        colors: { 'editor.background': '#0f1117', 'editor.foreground': '#eef0f8' }
      });
      editor = monaco.editor.create(document.getElementById('monaco-editor'), {
        value: `// Write your solution here\nfunction solution(input) {\n  // Your code\n  return input;\n}`,
        language: 'javascript',
        theme: 'dark',
        fontSize: 13,
        fontFamily: 'Space Mono',
        minimap: { enabled: false }
      });
    });
  }

  // ---------- EVALUATION (LOCAL, ONLY JS) ----------
  async function evaluateCode(code, examples) {
    const results = [];
    let capturedConsole = [];
    const originalLog = console.log;
    console.log = (...args) => { capturedConsole.push(args.map(a => String(a)).join(' ')); originalLog(...args); };

    for (let i = 0; i < examples.length; i++) {
      const ex = examples[i];
      try {
        // Build a function that runs the user code and returns solution(input)
        const wrappedCode = `"use strict";\n${code}\n; return solution(${JSON.stringify(ex.input)});`;
        const fn = new Function(wrappedCode);
        const got = fn();
        const expected = ex.output;
        const pass = String(got).trim() === String(expected).trim();
        results.push({
          id: i+1,
          input: ex.input,
          expected: expected,
          got: got,
          status: pass ? 'pass' : 'fail'
        });
      } catch (err) {
        results.push({
          id: i+1,
          input: ex.input,
          expected: ex.output,
          got: `Error: ${err.message}`,
          status: 'fail'
        });
      }
    }
    console.log = originalLog;
    return { results, consoleLog: capturedConsole.join('\n') };
  }

  async function runTests(isSubmit = false) {
    if (!currentQuestion || !currentQuestion.examples || currentQuestion.examples.length === 0) {
      document.getElementById('outBody').innerHTML = '<div>No test cases defined for this question.</div>';
      return false;
    }
    const code = editor.getValue();
    const examples = currentQuestion.examples;
    const { results, consoleLog: conLog } = await evaluateCode(code, examples);
    testResults = results;
    consoleOutput = conLog;
    renderTestResults();
    renderConsole();

    const allPassed = results.every(r => r.status === 'pass');
    if (isSubmit && allPassed) {
      // Save to solve_history and update profile
      if (currentUser) {
        await sb.from('solve_history').insert({
          user_id: currentUser.id,
          question_id: currentQuestion.id,
          difficulty: currentQuestion.difficulty,
          solved_at: new Date().toISOString()
        });
        const diffField = currentQuestion.difficulty === 'easy' ? 'easy_solved' : (currentQuestion.difficulty === 'medium' ? 'medium_solved' : 'hard_solved');
        // increment profile
        const { data: prof } = await sb.from('profiles').select(diffField).eq('id', currentUser.id).single();
        const newVal = (prof?.[diffField] || 0) + 1;
        await sb.from('profiles').update({ [diffField]: newVal }).eq('id', currentUser.id);
        // Show banner
        document.getElementById('bannerStats').innerHTML = `✅ ${results.length}/${results.length} tests passed<br>⏱️ Time: ${document.getElementById('timer').innerText}`;
        document.getElementById('solvedBanner').style.display = 'flex';
        clearInterval(timerInterval);
      }
    }
    return allPassed;
  }

  function renderTestResults() {
    const container = document.getElementById('outBody');
    if (window.currentTab !== 'tests') return;
    if (!testResults.length) { container.innerHTML = '<div>Click Run to execute code</div>'; return; }
    let html = '';
    for (let t of testResults) {
      const pass = t.status === 'pass';
      html += `<div class="test-case ${pass ? 'pass' : 'fail'}">
        <div><span class="case-status ${pass ? 'badge-pass' : 'badge-fail'}">${pass ? '✓ PASS' : '✗ FAIL'}</span> Test ${t.id}</div>
        <div>Input: ${t.input}</div>
        <div>Expected: ${t.expected}</div>
        <div>Got: ${t.got}</div>
      </div>`;
    }
    container.innerHTML = html;
  }

  function renderConsole() {
    if (window.currentTab !== 'console') return;
    document.getElementById('outBody').innerHTML = `<pre style="white-space:pre-wrap;">${consoleOutput || '(no console output)'}</pre>`;
  }

  // ---------- UI HANDLERS ----------
  document.getElementById('runBtn').onclick = async () => { await runTests(false); };
  document.getElementById('submitBtn').onclick = async () => { await runTests(true); };

  // tabs
  const tabs = document.querySelectorAll('.outtab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      window.currentTab = tab.dataset.tab;
      if (window.currentTab === 'tests') renderTestResults();
      else renderConsole();
    });
  });
  window.currentTab = 'tests';

  // initial auth check
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      currentUser = session.user;
      await ensureProfile(currentUser);
      document.getElementById('loginPrompt').style.display = 'none';
      await loadQuestion();
      initEditor();
    } else {
      document.getElementById('loginPrompt').style.display = 'flex';
    }
  })();
</script>
</body>
</html>
