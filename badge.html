<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- ─── DYNAMIC OG TAGS (filled by JS) ─── -->
<title>CodeArena Badge</title>
<meta name="description" content="Earned on CodeArena — a real coding battle platform." id="meta-desc"/>

<!-- Open Graph (LinkedIn reads these for preview card) -->
<meta property="og:type" content="profile" id="og-type"/>
<meta property="og:title" content="CodeArena Badge" id="og-title"/>
<meta property="og:description" content="Earned by solving real coding challenges on CodeArena." id="og-desc"/>
<meta property="og:image" content="https://codearena.vercel.app/og-badge.png" id="og-image"/>
<meta property="og:url" content="" id="og-url"/>
<meta name="twitter:card" content="summary_large_image"/>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#0f1117; --surface:#161b27; --card:#1c2333; --border:#2a3350; --border2:#334066;
  --star:#f4c430; --mint:#4ade80; --sky:#60a5fa; --lilac:#a78bfa; --rose:#fb7185; --teal:#2dd4bf;
  --t1:#eef0f8; --t2:#8b93b0; --t3:#545e80;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--t1);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* STARS */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.s{position:absolute;border-radius:50%;animation:tw var(--d,3s) var(--dl,0s) infinite ease-in-out;}
@keyframes tw{0%,100%{opacity:.1}50%{opacity:.7}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(15,17,23,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--t1);text-decoration:none;display:flex;align-items:center;gap:6px;}
.logo-star{color:var(--star);}
.nav-back{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--t2);font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .18s;}
.nav-back:hover{border-color:var(--border2);color:var(--t1);}

/* MAIN CARD */
.badge-page{position:relative;z-index:1;width:100%;max-width:520px;margin-top:56px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 0;color:var(--t2);}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--star);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* BADGE CARD — the shareable visual */
.badge-card{
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:40px 36px; text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  position:relative; overflow:hidden;
}
.badge-card::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%, rgba(244,196,48,.06) 0%, transparent 65%);
}
.bc-warrior{border-top:2px solid var(--sky);}
.bc-eagle{border-top:2px solid var(--mint);}
.bc-divine{border-top:2px solid var(--star);}

.badge-platform{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:4px 12px;
  font-size:.68rem; font-weight:600; color:var(--t2);
  margin-bottom:28px;
}

.badge-icon-wrap{
  width:110px; height:110px; border-radius:50%;
  margin:0 auto 24px;
  display:flex; align-items:center; justify-content:center;
  font-size:3.4rem;
  position:relative;
}
.bc-warrior .badge-icon-wrap{background:radial-gradient(circle,rgba(96,165,250,.15),transparent 70%);box-shadow:0 0 0 1px rgba(96,165,250,.2),0 0 32px rgba(96,165,250,.12);}
.bc-eagle .badge-icon-wrap{background:radial-gradient(circle,rgba(74,222,128,.15),transparent 70%);box-shadow:0 0 0 1px rgba(74,222,128,.2),0 0 32px rgba(74,222,128,.12);}
.bc-divine .badge-icon-wrap{background:radial-gradient(circle,rgba(244,196,48,.18),transparent 70%);box-shadow:0 0 0 1px rgba(244,196,48,.25),0 0 32px rgba(244,196,48,.15);}

.badge-name-big{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:.04em;margin-bottom:6px;}
.bc-warrior .badge-name-big{color:var(--sky);}
.bc-eagle .badge-name-big{color:var(--mint);}
.bc-divine .badge-name-big{color:var(--star);}

.badge-earned-by{font-size:.82rem;color:var(--t2);margin-bottom:4px;}
.badge-username{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:var(--t1);margin-bottom:20px;}

.badge-divider{height:1px;background:var(--border);margin:20px 0;}

.badge-stats{display:flex;justify-content:center;gap:32px;}
.bs-item{text-align:center;}
.bs-num{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--t1);display:block;}
.bs-label{font-size:.68rem;font-weight:500;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

.badge-req-line{
  margin-top:20px; padding:10px 14px;
  background:var(--surface); border-radius:9px; border:1px solid var(--border);
  font-size:.78rem; color:var(--t2); line-height:1.55;
}

.badge-date{font-size:.72rem;color:var(--t3);margin-top:16px;}

/* PIXEL ROW */
.px-row{display:flex;gap:5px;justify-content:center;margin:20px 0 0;}
.px{width:8px;height:8px;border-radius:2px;opacity:.7;}

/* SHARE SECTION */
.share-section{margin-top:20px;}
.share-title{font-size:.72rem;font-weight:600;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;text-align:center;}
.share-btns{display:flex;flex-direction:column;gap:10px;}

/* LINKEDIN SHARE */
.btn-linkedin{
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:13px; border:none; border-radius:10px;
  background:#0a66c2; color:#fff;
  font-family:'Space Grotesk',sans-serif; font-size:.9rem; font-weight:700;
  cursor:pointer; transition:all .2s;
}
.btn-linkedin:hover{background:#0958a8;transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,102,194,.35);}

/* LINKEDIN CERT — add to profile */
.btn-linkedin-cert{
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px; border-radius:10px;
  background:transparent; border:1px solid #0a66c2; color:#60a5fa;
  font-family:'Space Grotesk',sans-serif; font-size:.88rem; font-weight:600;
  cursor:pointer; transition:all .2s;
}
.btn-linkedin-cert:hover{background:rgba(10,102,194,.08);transform:translateY(-1px);}

/* COPY LINK */
.btn-copy{
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:11px; border-radius:10px;
  background:var(--surface); border:1px solid var(--border); color:var(--t2);
  font-family:'Space Grotesk',sans-serif; font-size:.84rem; font-weight:600;
  cursor:pointer; transition:all .18s;
}
.btn-copy:hover{border-color:var(--border2);color:var(--t1);}
.btn-copy.copied{border-color:var(--mint);color:var(--mint);background:rgba(74,222,128,.05);}

/* HOW TO ADD - instructions */
.how-cert{
  margin-top:20px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px 20px;
}
.how-cert-title{font-size:.76rem;font-weight:700;color:var(--t1);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.how-steps{list-style:none;display:flex;flex-direction:column;gap:6px;}
.how-steps li{font-size:.74rem;color:var(--t2);display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.how-step-num{min-width:18px;height:18px;border-radius:50%;background:var(--card);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;color:var(--star);margin-top:1px;}

/* NOT FOUND */
.not-found{text-align:center;padding:60px 20px;}
.nf-ico{font-size:3rem;margin-bottom:16px;opacity:.4;}
.nf-t{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:8px;}
.nf-d{font-size:.84rem;color:var(--t2);line-height:1.65;}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:.64rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.chip-yellow{background:rgba(244,196,48,.12);color:var(--star);border:1px solid rgba(244,196,48,.2);}
.chip-mint{background:rgba(74,222,128,.1);color:var(--mint);border:1px solid rgba(74,222,128,.18);}
.chip-sky{background:rgba(96,165,250,.1);color:var(--sky);border:1px solid rgba(96,165,250,.18);}

@media(max-width:560px){
  nav{padding:0 16px;}.badge-card{padding:28px 20px;}.badge-page{margin-top:56px;}
}
</style>
</head>
<body>

<div id="stars"></div>

<nav>
  <a href="/" class="logo">CodeArena <span class="logo-star">⋆˙⟡</span></a>
  <a href="/" class="nav-back">← Back to Arena</a>
</nav>

<main class="badge-page" id="main">
  <div class="loading" id="loading">
    <div class="spin"></div>
    <span>Loading badge…</span>
  </div>
</main>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// REPLACE WITH YOUR KEYS
const SUPABASE_URL  = 'https://tcawycumfawsxkcfnlpv.supabase.co';
const SUPABASE_ANON = 'sb_publishable_S7eYZ7QLkPXNVudjjeOA5g_3f1Y8ddU';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// Stars
const st = document.getElementById('stars');
for(let i=0;i<90;i++){
  const el=document.createElement('div'); el.className='s';
  const sz=Math.random()*1.6+.4;
  el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:rgba(${Math.random()>.5?'244,196,48':'200,215,255'},${Math.random()*.5+.15});--d:${Math.random()*3+2}s;--dl:${Math.random()*4}s;`;
  st.appendChild(el);
}

// Get userId + badge from URL
// URL format: /badge.html?user=USER_ID&badge=divine
// OR: /badge/USER_ID (Nuxt route)
function getParams() {
  const params = new URLSearchParams(window.location.search);
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  return {
    userId: params.get('user') || pathParts[pathParts.length-1],
    badge:  params.get('badge') || null
  };
}

const BADGE_CONFIG = {
  warrior: { icon:'⚔️', name:'WARRIOR', color:'var(--sky)', chipClass:'chip-sky',  cardClass:'bc-warrior', req:'Solved 10 Easy questions in real battles', desc:'Completed 10 Easy coding battles on CodeArena.' },
  eagle:   { icon:'🦅', name:'EAGLE',   color:'var(--mint)', chipClass:'chip-mint', cardClass:'bc-eagle',   req:'Solved 10 Medium questions in real battles', desc:'Completed 10 Medium coding battles on CodeArena.' },
  divine:  { icon:'⚡', name:'DIVINE',  color:'var(--star)', chipClass:'chip-yellow',cardClass:'bc-divine', req:'Solved 10 Hard questions in real battles', desc:'Completed 10 Hard coding battles on CodeArena — the highest rank.' },
};

function rk(rk){if(rk==='g')return'#ffd700';if(rk==='s')return'#b0c0d0';return'#cd7f32';}

async function loadBadge() {
  const { userId, badge: badgeParam } = getParams();

  if (!userId) { showNotFound('No user specified.', 'Add ?user=YOUR_USER_ID to the URL.'); return; }

  // Fetch profile from Supabase
  const { data: profile, error } = await sb
    .from('profiles')
    .select('id, username, badge, easy_solved, medium_solved, hard_solved, battles_won, avatar_url, created_at')
    .eq('id', userId)
    .single();

  if (error || !profile) { showNotFound('Profile not found.', 'This badge link may be invalid or the user has deleted their account.'); return; }

  // Which badge to show — from URL param OR their highest earned badge
  const badgeToShow = badgeParam || profile.badge;
  const cfg = BADGE_CONFIG[badgeToShow];

  // Check if they actually earned it
  const earned = {
    warrior: profile.easy_solved >= 10,
    eagle:   profile.medium_solved >= 10,
    divine:  profile.hard_solved >= 10,
  };

  if (!cfg || !earned[badgeToShow]) {
    showNotFound('Badge not earned yet.', `${profile.username} hasn't unlocked the ${badgeToShow || 'requested'} badge yet. Keep battling!`);
    return;
  }

  // Update OG tags dynamically
  const pageUrl = window.location.href;
  const ogTitle = `${profile.username} earned the ${cfg.name} badge on CodeArena ⋆˙⟡`;
  const ogDesc  = `${cfg.desc} ${profile.battles_won} battles won. Real coding battles — no fakes.`;
  document.title = ogTitle;
  document.getElementById('og-title').content  = ogTitle;
  document.getElementById('og-desc').content   = ogDesc;
  document.getElementById('og-url').content    = pageUrl;
  document.getElementById('meta-desc').content = ogDesc;

  // Earned date (approximate — when they hit the threshold)
  const earnedDate = new Date(profile.created_at).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'});

  const allBadges = ['warrior','eagle','divine'].filter(b=>earned[b]);

  document.getElementById('main').innerHTML = `
    <!-- BADGE VISUAL CARD -->
    <div class="badge-card ${cfg.cardClass}" id="badge-visual">
      <div class="badge-platform">
        <span style="color:var(--star);">⋆˙⟡</span> CodeArena
      </div>

      <div class="badge-icon-wrap">
        <span style="font-size:3.2rem;">${cfg.icon}</span>
      </div>

      <div class="badge-name-big">${cfg.name}</div>
      <div class="badge-earned-by">Earned by</div>
      <div class="badge-username">${profile.username}</div>

      ${allBadges.length > 1 ? `<div style="display:flex;gap:6px;justify-content:center;margin-bottom:4px;">${allBadges.map(b=>`<span class="chip ${BADGE_CONFIG[b].chipClass}">${BADGE_CONFIG[b].icon} ${BADGE_CONFIG[b].name}</span>`).join('')}</div>` : ''}

      <div class="badge-divider"></div>

      <div class="badge-stats">
        <div class="bs-item">
          <span class="bs-num">${profile.easy_solved}</span>
          <span class="bs-label">Easy</span>
        </div>
        <div class="bs-item">
          <span class="bs-num">${profile.medium_solved}</span>
          <span class="bs-label">Medium</span>
        </div>
        <div class="bs-item">
          <span class="bs-num">${profile.hard_solved}</span>
          <span class="bs-label">Hard</span>
        </div>
        <div class="bs-item">
          <span class="bs-num">${profile.battles_won}</span>
          <span class="bs-label">Wins</span>
        </div>
      </div>

      <div class="badge-req-line">
        ✦ ${cfg.req}
      </div>

      <div class="badge-date">Awarded · ${earnedDate}</div>

      <div class="px-row">
        <div class="px" style="background:var(--star)"></div>
        <div class="px" style="background:var(--mint)"></div>
        <div class="px" style="background:var(--lilac)"></div>
        <div class="px" style="background:var(--rose)"></div>
        <div class="px" style="background:var(--sky)"></div>
      </div>
    </div>

    <!-- SHARE SECTION -->
    <div class="share-section">
      <div class="share-title">Share this badge</div>
      <div class="share-btns">

        <!-- LINKEDIN POST -->
        <button class="btn-linkedin" onclick="shareLinkedInPost()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          Share on LinkedIn
        </button>

        <!-- ADD TO PROFILE (Certification) -->
        <button class="btn-linkedin-cert" onclick="addLinkedInCert('${badgeToShow}', '${profile.username}', '${pageUrl}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#60a5fa"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          Add to LinkedIn Profile (Certification)
        </button>

        <!-- COPY LINK -->
        <button class="btn-copy" id="copy-btn" onclick="copyLink()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy badge link
        </button>
      </div>

      <!-- HOW TO ADD TO LINKEDIN PROFILE -->
      <div class="how-cert">
        <div class="how-cert-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--star)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          How to add this to your LinkedIn profile
        </div>
        <ol class="how-steps">
          <li><div class="how-step-num">1</div><span>Click <strong style="color:var(--t1);">"Add to LinkedIn Profile"</strong> above — it opens LinkedIn directly</span></li>
          <li><div class="how-step-num">2</div><span>On LinkedIn: <strong style="color:var(--t1);">Add to profile → Licenses & Certifications</strong></span></li>
          <li><div class="how-step-num">3</div><span>Name: <strong style="color:var(--t1);">CodeArena ${cfg.name} Badge</strong></span></li>
          <li><div class="how-step-num">4</div><span>Issuing org: <strong style="color:var(--t1);">CodeArena</strong></span></li>
          <li><div class="how-step-num">5</div><span>Credential URL: paste your badge link — recruiters can verify it ✦</span></li>
        </ol>
      </div>
    </div>
  `;
}

// ── SHARE FUNCTIONS ─────────────────────────
function shareLinkedInPost() {
  const { userId, badge } = getParams();
  const badgeToShow = badge || 'divine';
  const cfg = BADGE_CONFIG[badgeToShow];
  const url = encodeURIComponent(window.location.href);
  const text = encodeURIComponent(
    `I just earned the ${cfg.icon} ${cfg.name} badge on CodeArena ⋆˙⟡\n\n` +
    `${cfg.desc}\n\n` +
    `CodeArena is a platform where you describe real-life situations and battle live opponents to solve AI-generated coding questions.\n\n` +
    `Verify my badge here:`
  );
  window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}&summary=${text}`, '_blank', 'width=600,height=600');
}

function addLinkedInCert(badgeType, username, badgeUrl) {
  const cfg = BADGE_CONFIG[badgeType];
  const certName = encodeURIComponent(`CodeArena ${cfg.name} Badge`);
  const orgName  = encodeURIComponent('CodeArena');
  const certUrl  = encodeURIComponent(badgeUrl);
  // LinkedIn Add Certification deep link
  const liUrl = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${certName}&organizationName=${orgName}&certUrl=${certUrl}&certId=${badgeType}_${username}`;
  window.open(liUrl, '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy badge link`;
    }, 2200);
  });
}

function showNotFound(title, desc) {
  document.getElementById('main').innerHTML = `
    <div class="not-found">
      <div class="nf-ico">🏅</div>
      <div class="nf-t">${title}</div>
      <p class="nf-d">${desc}</p>
      <a href="/" style="display:inline-block;margin-top:20px;padding:10px 22px;background:var(--star);color:#0f1117;border-radius:8px;font-weight:700;font-size:.84rem;text-decoration:none;">Go to CodeArena →</a>
    </div>`;
}

// Init
loadBadge().catch(e=>{ console.error(e); showNotFound('Something went wrong.', 'Please try again.'); });
</script>
